version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "17474:7474"   # Browser
      - "17687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/graphiti_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p graphiti_dev 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: kgplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "19000:9000"   # API
      - "19001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO bucket auto-creation
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/documents --ignore-existing;
      exit 0;
      "

  # ── Application Services ────────────────────────────────
  graphiti-server:
    build:
      context: ./services/graphiti-server
      dockerfile: Dockerfile
    ports:
      - "18100:8100"
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphiti-worker:
    build:
      context: ./services/graphiti-server
      dockerfile: Dockerfile
    command: ["python", "-m", "src.worker"]
    env_file: .env
    depends_on:
      graphiti-server:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphiti-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "15173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  postgres_data:
  minio_data:
